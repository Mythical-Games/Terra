name: Build Allay

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x gradlew

      - name: Build Allay
        run: ./gradlew :platforms:allay:build

      - name: Upload Allay JAR
        uses: actions/upload-artifact@v4
        with:
          name: terra-allay
          path: platforms/allay/build/libs/*.jar
